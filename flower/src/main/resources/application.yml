spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/flowwow
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  # Настройки JPA (Hibernate)
  jpa:
    hibernate:
      ddl-auto: update        # автоматически создает/обновляет таблицы
      # (для разработки, в продакшене use validate)
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Настройки загрузки файлов
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT настройки
jwt:
  secret: mySecretKey2024ForJwtAuthentication
  expiration: 86400000        # 24 часа в миллисекундах

# Папка для хранения загруженных картинок
upload:
  path: ./uploads


server:
  port: 8080